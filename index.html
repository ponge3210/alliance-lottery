<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>同盟抽籤系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a23;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #7c6ff7;
    --accent2: #a89eff;
    --green: #34d399;
    --red: #f87171;
    --text: #e8e8f0;
    --text2: #9898b0;
    --text3: #5a5a70;
    --radius: 10px;
    --radius-lg: 16px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--accent2);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .top-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 16px;
  }
  @media(max-width:640px){ .top-row { grid-template-columns: 1fr; } }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  input[type=text] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--text3); }
  .btn {
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #2e2e3e; border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #6a5ee6; border-color: #6a5ee6; }
  .btn-danger { background: transparent; color: var(--red); border-color: rgba(248,113,113,0.3); padding: 3px 8px; font-size: 12px; }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .btn-add { background: transparent; color: var(--accent2); border-color: rgba(168,158,255,0.3); padding: 3px 8px; font-size: 12px; }
  .btn-add:hover { background: rgba(124,111,247,0.12); }
  .btn-success { background: var(--green); color: #0f1f17; border-color: var(--green); }
  .btn-success:hover { background: #22c87e; }
  .btn-reset { border-color: var(--border2); }
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 220px;
    overflow-y: auto;
  }
  .member-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: grab;
    transition: border-color 0.15s;
  }
  .member-item:hover { border-color: var(--border2); }
  .member-item.dragging { opacity: 0.35; }
  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-height: 460px;
    overflow-y: auto;
  }
  .rank-slot {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    min-height: 33px;
    transition: border-color 0.15s, background 0.15s;
  }
  .rank-slot.drag-over { border-color: var(--accent); background: rgba(124,111,247,0.08); }
  .rank-slot.filled { border-style: solid; border-color: var(--border2); background: var(--surface2); }
  .rank-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    min-width: 20px;
    text-align: right;
  }
  .rank-name { flex: 1; color: var(--text); font-size: 13px; }
  .rank-btns { display: flex; gap: 3px; }
  .rank-btns button {
    padding: 1px 7px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    line-height: 1.5;
    transition: background 0.12s;
  }
  .rank-btns button:hover { background: var(--surface); }
  .rank-btns button:disabled { opacity: 0.2; cursor: default; }
  .rank-btns .rm-btn { color: var(--red); border-color: rgba(248,113,113,0.25); }
  .rank-btns .rm-btn:hover { background: rgba(248,113,113,0.1); }
  .empty-hint { font-size: 12px; color: var(--text3); text-align: center; padding: 14px 0; }
  .wheel-area {
    max-width: 1100px;
    margin: 0 auto;
  }
  .wheel-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: flex-start;
    justify-content: center;
  }
  .wheel-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #wheel { border-radius: 50%; display: block; }
  .wheel-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .wheel-status { font-size: 12px; color: var(--text3); text-align: center; min-height: 18px; }
  .result-col { flex: 1; min-width: 180px; max-width: 340px; }
  .result-label { font-size: 12px; font-weight: 600; color: var(--accent2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .spin-result {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 8px;
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid var(--border);
  }
  .result-item {
    padding: 5px 4px;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-num { font-size: 11px; color: var(--text3); min-width: 28px; }
  .result-name { font-weight: 600; color: var(--green); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>
<h1>⚔️ 同盟火車抽抽樂 🚄</h1>

<div class="top-row">
  <div class="panel">
    <div class="panel-title">所有成員清單</div>
    <div class="input-row">
      <input id="memberInput" type="text" placeholder="輸入成員名字" maxlength="20" />
      <button class="btn btn-primary" onclick="addMember()">新增</button>
    </div>
    <div id="memberList" class="member-list"></div>
  </div>
  <div class="panel">
    <div class="panel-title">前 20 積分排名</div>
    <div id="rankList" class="rank-list"></div>
  </div>
</div>

<div class="panel wheel-area">
  <div class="panel-title">抽籤輪盤</div>
  <div class="wheel-inner">
    <div class="wheel-col">
      <button class="btn btn-reset" onclick="resetWheel()">新的抽籤</button>
      <div style="position:relative;display:inline-block">
        <canvas id="wheel" width="280" height="280"></canvas>
        <div id="wheelArrow" style="position:absolute;top:4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:20px solid #f87171;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))"></div>
      </div>
      <button class="btn btn-success" onclick="spin()">開始抽籤</button>
      <div id="wheelStatus" class="wheel-status"></div>
    </div>
    <div class="result-col">
      <div class="result-label">抽籤結果</div>
      <div id="spinResult" class="spin-result"><div class="empty-hint">尚無抽籤結果</div></div>
    </div>
  </div>
</div>

<script>
let members = [];
let ranking = new Array(20).fill(null);
let wheelPeople = [];   // 全部輪盤成員（不移除）
let drawnSet = new Set(); // 已抽到的人
let spinResults = [];
let spinning = false;
let dragSource = null;
let dragType = null;
let wheelOffset = 0;

const COLORS = ['#7c6ff7','#34d399','#f97316','#ec4899','#38bdf8','#a3e635','#facc15','#fb7185','#818cf8','#2dd4bf','#c084fc','#fb923c','#4ade80','#60a5fa','#e879f9','#fbbf24','#f472b6','#34d399','#a78bfa','#94a3b8'];

function save() {
  try { localStorage.setItem('allianceLottery', JSON.stringify({ members, ranking })); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('allianceLottery');
    if (d) { const p = JSON.parse(d); members = p.members || []; ranking = p.ranking || new Array(20).fill(null); }
  } catch(e) {}
}

function addMember() {
  const inp = document.getElementById('memberInput');
  const name = inp.value.trim();
  if (!name) return;
  if (members.includes(name)) { alert('成員已存在！'); return; }
  members.push(name);
  inp.value = '';
  save(); renderMembers();
}
function removeMember(name) {
  members = members.filter(m => m !== name);
  ranking = ranking.map(r => r === name ? null : r);
  save(); renderMembers(); renderRanking();
}

function addToRanking(name) {
  if (ranking.includes(name)) { alert(`「${name}」已在排名清單中！`); return; }
  const emptyIdx = ranking.indexOf(null);
  if (emptyIdx === -1) { alert('排名清單已達 20 人上限，無法再加入！'); return; }
  ranking[emptyIdx] = name;
  save(); renderRanking();
}

function renderMembers() {
  const el = document.getElementById('memberList');
  if (!members.length) { el.innerHTML = '<div class="empty-hint">尚未新增成員</div>'; return; }
  el.innerHTML = members.map(m => `
    <div class="member-item" draggable="true" data-name="${m}"
      ondragstart="onMemberDragStart(event,'${m}')"
      ondragend="onDragEnd(event)">
      <span style="flex:1">${m}</span>
      <button class="btn btn-add" onclick="addToRanking('${m}')">加入排名</button>
      <button class="btn btn-danger" onclick="removeMember('${m}')">移除</button>
    </div>`).join('');
}

function renderRanking() {
  const el = document.getElementById('rankList');
  el.innerHTML = ranking.map((name, i) => {
    const filled = name ? 'filled' : '';
    return `<div class="rank-slot ${filled}" data-index="${i}"
      ondragover="onRankDragOver(event,${i})"
      ondragleave="onRankDragLeave(event)"
      ondrop="onRankDrop(event,${i})">
      <span class="rank-num">${i + 1}</span>
      ${name
        ? `<span class="rank-name">${name}</span>
           <div class="rank-btns">
             <button ${i > 0 ? '' : 'disabled'} onclick="moveRank(${i},-1)">▲</button>
             <button ${i < 19 ? '' : 'disabled'} onclick="moveRank(${i},1)">▼</button>
             <button class="rm-btn" onclick="removeRank(${i})">✕</button>
           </div>`
        : `<span style="font-size:11px;color:var(--text3)">拖曳成員至此</span>`}
    </div>`;
  }).join('');
}

function moveRank(i, dir) {
  const j = i + dir;
  if (j < 0 || j > 19) return;
  [ranking[i], ranking[j]] = [ranking[j], ranking[i]];
  save(); renderRanking();
}
function removeRank(i) { ranking[i] = null; save(); renderRanking(); }

function onMemberDragStart(e, name) {
  dragSource = name; dragType = 'member';
  e.dataTransfer.effectAllowed = 'copy';
  e.target.classList.add('dragging');
}
function onDragEnd(e) { e.target.classList.remove('dragging'); }
function onRankDragOver(e, i) {
  e.preventDefault();
  document.querySelectorAll('.rank-slot').forEach(s => s.classList.remove('drag-over'));
  const slot = document.querySelector(`.rank-slot[data-index="${i}"]`);
  if (slot) slot.classList.add('drag-over');
}
function onRankDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onRankDrop(e, i) {
  e.preventDefault();
  document.querySelectorAll('.rank-slot').forEach(s => s.classList.remove('drag-over'));
  if (dragType === 'member' && dragSource) {
    if (ranking.includes(dragSource)) { alert('此成員已在排名中！'); return; }
    ranking[i] = dragSource;
    save(); renderRanking();
  } else if (dragType === 'rank') {
    const from = parseInt(dragSource);
    if (from === i) return;
    [ranking[from], ranking[i]] = [ranking[i], ranking[from]];
    save(); renderRanking();
  }
}

document.getElementById('rankList').addEventListener('dragstart', e => {
  const slot = e.target.closest('.rank-slot.filled');
  if (slot) { dragSource = slot.dataset.index; dragType = 'rank'; }
});

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

function drawWheel(offset) {
  offset = offset || 0;
  ctx.clearRect(0, 0, 280, 280);
  const cx = 140, cy = 140, r = 130;
  if (!wheelPeople.length) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a23'; ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#5a5a70'; ctx.font = '14px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('輪盤未設定', cx, cy); return;
  }
  const n = wheelPeople.length;
  const arc = (Math.PI * 2) / n;
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(offset); ctx.translate(-cx, -cy);
  wheelPeople.forEach((p, i) => {
    const s = i * arc - Math.PI / 2;
    const drawn = drawnSet.has(p);
    // 扇形填色：已抽到的反灰
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, s + arc); ctx.closePath();
    ctx.fillStyle = drawn ? '#2e2e38' : COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#0f0f13'; ctx.lineWidth = 1.5; ctx.stroke();
    // 文字
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(s + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = drawn ? 'rgba(120,120,130,0.7)' : 'rgba(0,0,0,0.85)';
    const fs = n > 14 ? 9 : n > 9 ? 11 : 13;
    ctx.font = `600 ${fs}px sans-serif`;
    let label = p;
    if (ctx.measureText(label).width > 85) label = label.slice(0, n > 12 ? 4 : 6) + '…';
    ctx.fillText(label, r - 8, 0);
    // 已抽到的加刪除線效果（短橫線）
    if (drawn) {
      const tw = Math.min(ctx.measureText(label).width, 80);
      ctx.strokeStyle = 'rgba(120,120,130,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(r - 8 - tw, -1); ctx.lineTo(r - 8, -1); ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();
  // 中心圓（無箭頭，箭頭已改為 HTML 元素放在 12 點鐘）
  ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0f13'; ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.stroke();
}

function resetWheel() {
  wheelPeople = ranking.filter(n => n !== null);
  drawnSet = new Set();
  spinResults = [];
  wheelOffset = 0;
  document.getElementById('spinResult').innerHTML = '<div class="empty-hint">尚無抽籤結果</div>';
  document.getElementById('wheelStatus').textContent = wheelPeople.length ? `輪盤已設定 ${wheelPeople.length} 人` : '排名清單無成員';
  drawWheel(0);
}

function spin() {
  if (spinning) return;
  if (!wheelPeople.length) { alert('請先按「新的抽籤」設定輪盤！'); return; }
  const available = wheelPeople.filter(p => !drawnSet.has(p));
  if (!available.length) { alert('所有人員都已抽完！請按「新的抽籤」重新開始。'); return; }
  spinning = true;

  const winner = available[Math.floor(Math.random() * available.length)];
  const winIdx = wheelPeople.indexOf(winner);

  const n = wheelPeople.length;
  const arcSize = (Math.PI * 2) / n;

  // 每個扇形 i 的起始角 = i*arcSize - PI/2（12點鐘為 -PI/2）
  // 扇形中心角（未加 offset）= winIdx*arcSize - PI/2 + arcSize/2
  // 要讓 offset 後的扇形中心對準 12 點鐘（-PI/2）：
  //   offset + winIdx*arcSize - PI/2 + arcSize/2 ≡ -PI/2  (mod 2PI)
  //   => offset ≡ -(winIdx*arcSize + arcSize/2)  (mod 2PI)
  const startOffset = wheelOffset;
  const targetOffset = ((-(winIdx * arcSize + arcSize / 2)) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const diff = (targetOffset - (startOffset % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const totalRot = Math.PI * 2 * 6 + (diff === 0 ? Math.PI * 2 : diff);

  const dur = 3200;
  const startTime = performance.now();

  function frame(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    drawWheel(startOffset + ease * totalRot);
    if (t < 1) { requestAnimationFrame(frame); return; }
    wheelOffset = (startOffset + totalRot) % (Math.PI * 2);
    drawnSet.add(winner);
    spinResults.push(winner);
    spinning = false;
    drawWheel(wheelOffset);
    renderResults();
    const remaining = wheelPeople.length - drawnSet.size;
    document.getElementById('wheelStatus').textContent =
      remaining > 0 ? `剩餘 ${remaining} 人未抽` : '🎉 所有人員已抽完！';
  }
  requestAnimationFrame(frame);
}

function renderResults() {
  const el = document.getElementById('spinResult');
  if (!spinResults.length) { el.innerHTML = '<div class="empty-hint">尚無抽籤結果</div>'; return; }
  el.innerHTML = spinResults.map((n, i) =>
    `<div class="result-item">
      <span class="result-num">第 ${i + 1} 次</span>
      <span class="result-name">${n}</span>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

document.getElementById('memberInput').addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });

load(); renderMembers(); renderRanking(); drawWheel(0);
</script>
</body>
</html>
